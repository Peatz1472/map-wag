<style>
  :root {
    --ink: #0a1628;
    --ink-soft: #2a3a52;
    --paper: #f4f6f8;
    --paper-warm: #eaeef2;
    --accent: #00a3ff;
    --accent-deep: #0070c9;
    --accent-soft: #e3f2fd;
    --gold: #f5a623;
    --line: #d8dee6;
    --line-soft: #e8ecf1;

    /* Zone colors */
    --zone-north: #2563eb;     /* น้ำเงิน */
    --zone-east: #dc2626;      /* แดง */
    --zone-west: #16a34a;      /* เขียว */
    --zone-south-bkk: #9333ea; /* ม่วง */
    --zone-pattaya: #ea580c;   /* ส้ม */
    --zone-south: #0891b2;     /* ฟ้าน้ำทะเล */
    --zone-isan: #ca8a04;      /* ทอง */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    color: var(--ink);
    background: var(--paper);
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  aside {
    background: #fff;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
  }

  .brand {
    padding: 24px 24px 18px;
    border-bottom: 1px solid var(--line-soft);
    background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  .brand::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 90% 20%, rgba(0,163,255,0.25), transparent 60%);
    pointer-events: none;
  }

  .brand-mark {
    display: flex;
    align-items: baseline;
    gap: 4px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1;
    position: relative;
  }

  .brand-mark .amp {
    color: var(--accent);
    font-weight: 500;
    font-style: italic;
  }

  .brand-mark .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin-left: 2px;
    align-self: end;
    margin-bottom: 6px;
  }

  .brand-tag {
    font-size: 12px;
    margin-top: 6px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.02em;
    position: relative;
  }

  .brand-stats {
    margin-top: 14px;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    position: relative;
  }

  .brand-stats strong {
    color: #fff;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 700;
    display: block;
    margin-bottom: 1px;
  }

  /* Search */
  .search-wrap {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-soft);
    background: #fff;
  }

  .search {
    position: relative;
  }

  .search input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
    transition: all 0.15s ease;
  }

  .search input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(0,163,255,0.1);
  }

  .search svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-soft);
    opacity: 0.5;
  }

  /* Zone filters */
  .zones {
    padding: 14px 16px 8px;
    border-bottom: 1px solid var(--line-soft);
  }

  .zones-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .zone-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    border: 1.5px solid var(--line);
    background: #fff;
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }

  .chip:hover {
    border-color: var(--ink-soft);
    transform: translateY(-1px);
  }

  .chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--zone-color, var(--accent));
  }

  .chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  .chip[data-zone="all"].active {
    background: var(--accent-deep);
    border-color: var(--accent-deep);
  }

  /* Branch list */
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .list::-webkit-scrollbar {
    width: 6px;
  }
  .list::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 3px;
  }

  .zone-group {
    padding: 12px 16px 4px;
  }

  .zone-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line);
  }

  .zone-header .bar {
    width: 3px;
    height: 14px;
    background: var(--zone-color);
    border-radius: 2px;
  }

  .zone-count {
    margin-left: auto;
    font-family: 'Bricolage Grotesque', sans-serif;
    background: var(--paper);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
  }

  .branch {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 2px;
  }

  .branch:hover {
    background: var(--paper);
  }

  .branch.active {
    background: var(--accent-soft);
  }

  .branch-pin {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .branch-pin svg {
    width: 100%;
    height: 100%;
  }

  .branch-body {
    flex: 1;
    min-width: 0;
  }

  .branch-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--ink);
    word-break: break-word;
  }

  .branch-meta {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
    opacity: 0.75;
  }

  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    opacity: 0.6;
  }

  /* ===== MAP ===== */
  main {
    position: relative;
    background: var(--paper-warm);
  }

  #map {
    height: 100%;
    width: 100%;
    background: #dde4eb;
  }

  /* Floating header on map */
  .map-overlay {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 500;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .map-btn {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(10,22,40,0.08);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .map-btn:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Custom Leaflet popup */
  .leaflet-popup-content-wrapper {
    border-radius: 12px;
    padding: 0;
    box-shadow: 0 8px 24px rgba(10,22,40,0.18);
    border: 1px solid var(--line);
  }

  .leaflet-popup-content {
    margin: 0;
    width: 260px !important;
    font-family: 'IBM Plex Sans Thai', sans-serif;
  }

  .leaflet-popup-tip {
    background: #fff;
  }

  .popup {
    overflow: hidden;
    border-radius: 12px;
  }

  .popup-head {
    padding: 14px 16px 10px;
    background: linear-gradient(135deg, #0a1628, #1a3a5c);
    color: #fff;
    position: relative;
  }

  .popup-zone-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 999px;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .popup-zone-tag .pdot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .popup-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
  }

  .popup-body {
    padding: 12px 16px;
    background: #fff;
  }

  .popup-landmark {
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .popup-landmark svg {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--accent-deep);
  }

  .popup-coord {
    font-family: 'Bricolage Grotesque', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    opacity: 0.7;
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }

  .popup-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .popup-btn {
    text-decoration: none;
    text-align: center;
    padding: 9px 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .popup-btn.google {
    background: var(--accent-deep);
    color: #fff;
  }

  .popup-btn.google:hover {
    background: var(--ink);
  }

  .popup-btn.apple {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--line);
  }

  .popup-btn.apple:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Custom marker */
  .pin-icon {
    background: transparent;
    border: none;
  }

  /* Mobile */
  @media (max-width: 768px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    aside {
      max-height: 45vh;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    .brand-stats { display: none; }
    .leaflet-popup-content {
      width: 220px !important;
    }
  }
</style>
</head>

  { name: 'บางจาก บรมฯ (ศาลายา)',          lat: 13.788709567267619, lng: 100.34447384080613, zone: 'west',     landmark: 'บางจาก ถ.บรมราชชนนี ใกล้ศาลายา' },
  { name: 'PT MAX REST นครชัยศรี',         lat: 13.80836056769069,  lng: 100.1490408761757,  zone: 'west',     landmark: 'PT MAX REST นครชัยศรี' },
  { name: 'PTT ธรรมศาลา',                  lat: 13.81255250185,     lng: 100.10452761229372, zone: 'west',     landmark: 'ปตท. ธรรมศาลา นครปฐม' },

  // กรุงเทพฯ ใต้ / ฝั่งธน
  { name: 'บางจาก สำโรง',                  lat: 13.654393738983108, lng: 100.5993607332231,  zone: 'southbkk', landmark: 'ในปั๊มบางจาก ถ.สุขุมวิท สำโรง' },
  { name: 'Lotus เอกชัย 99/1',             lat: 13.657862853562822, lng: 100.39735593846419, zone: 'southbkk', landmark: 'ในห้าง Lotus เอกชัย 99/1' },
  { name: 'บางจาก ราษฎร์บูรณะ',            lat: 13.673047855798517, lng: 100.51795481159786, zone: 'southbkk', landmark: 'ในปั๊มบางจาก ถ.ราษฎร์บูรณะ' },

  // ชลบุรี / พัทยา
  { name: 'Susco นาเกลือ',                 lat: 12.9564646953509,   lng: 100.89174598292834, zone: 'pattaya',  landmark: 'ในปั๊ม Susco นาเกลือ พัทยา' },
  { name: 'บางจาก นาเกลือ',                lat: 12.964554090161295, lng: 100.91008547493757, zone: 'pattaya',  landmark: 'ในปั๊มบางจาก นาเกลือ' },
  { name: 'ปตท. แยกหาดจอมเทียน',           lat: 12.883005566433978, lng: 100.89917488269577, zone: 'pattaya',  landmark: 'ปั๊ม ปตท. แยกหาดจอมเทียน' },

  // ภาคใต้ / หาดใหญ่
  { name: 'PTT หน้าสวนสาธารณะหาดใหญ่',     lat: 7.039715659952488,  lng: 100.50234235403522, zone: 'south',    landmark: 'ปตท. หน้าสวนสาธารณะหาดใหญ่' },
  { name: 'สี่แยกไดอาน่า',                 lat: 6.99805515473577,   lng: 100.480051402687,   zone: 'south',    landmark: 'สี่แยกไดอาน่า หาดใหญ่' },

  // ภาคอีสาน / ขอนแก่น
  { name: 'บางจาก ขอนแก่น',                lat: 16.379936470345616, lng: 102.81135531045184, zone: 'isan',     landmark: 'ในปั๊มบางจาก จ.ขอนแก่น' }
];

// ============ STATE ============
let activeZone = 'all';
let searchTerm = '';
const markers = {}; // index -> marker
let activeBranchIdx = null;

// ============ MAP ============
const map = L.map('map', {
  zoomControl: false,
  attributionControl: true
}).setView([13.75, 100.55], 11);

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Custom pin maker
function makePin(color, isActive = false) {
  const size = isActive ? 36 : 30;
  const svg = `
  <svg width="${size}" height="${size * 1.3}" viewBox="0 0 30 39" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
      </filter>
    </defs>
    <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 24 15 24s15-13 15-24C30 6.7 23.3 0 15 0z"
          fill="${color}" filter="url(#sh)"/>
    <circle cx="15" cy="15" r="6" fill="#fff"/>
    <circle cx="15" cy="15" r="3" fill="${color}"/>
  </svg>`;

  return L.divIcon({
    className: 'pin-icon',
    html: svg,
    iconSize: [size, size * 1.3],
    iconAnchor: [size / 2, size * 1.3]
  });
}

// Build popup HTML
function popupHTML(b) {
  const zone = ZONES[b.zone];
  const gMaps = `https://www.google.com/maps/search/?api=1&query=${b.lat},${b.lng}`;
  const aMaps = `https://maps.apple.com/?q=${encodeURIComponent('Wash&Go ' + b.name)}&ll=${b.lat},${b.lng}`;

  return `
    <div class="popup">
      <div class="popup-head">
        <div class="popup-zone-tag">
          <span class="pdot" style="background:${zone.color}"></span>
          ${zone.short}
        </div>
        <div class="popup-name">Wash&amp;Go · ${b.name}</div>
      </div>
      <div class="popup-body">
        <div class="popup-landmark">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>${b.landmark}</span>
        </div>
        <div class="popup-coord">${b.lat.toFixed(5)}, ${b.lng.toFixed(5)}</div>
        <div class="popup-actions">
          <a class="popup-btn google" href="${gMaps}" target="_blank" rel="noopener">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18 15 12 9 6"/></svg>
            Google
          </a>
          <a class="popup-btn apple" href="${aMaps}" target="_blank" rel="noopener">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18 15 12 9 6"/></svg>
            Apple
          </a>
        </div>
      </div>
    </div>`;
}

// Place markers
BRANCHES.forEach((b, i) => {
  const m = L.marker([b.lat, b.lng], { icon: makePin(ZONES[b.zone].color) })
    .addTo(map)
    .bindPopup(popupHTML(b), { closeButton: true, maxWidth: 280, minWidth: 260 });

  m.on('click', () => {
    setActiveBranch(i);
  });
  markers[i] = m;
});

// ============ SIDEBAR RENDERING ============
const chipsEl = document.getElementById('chips');
const listEl  = document.getElementById('list');

function renderChips() {
  const all = `
    <button class="chip ${activeZone === 'all' ? 'active' : ''}" data-zone="all">
      <span class="dot" style="--zone-color:#0070c9; background:#0070c9"></span>
      ทั้งหมด <span style="opacity:.6">${BRANCHES.length}</span>
    </button>`;
  const items = Object.entries(ZONES).map(([key, z]) => {
    const count = BRANCHES.filter(b => b.zone === key).length;
    return `
      <button class="chip ${activeZone === key ? 'active' : ''}" data-zone="${key}">
        <span class="dot" style="background:${z.color}"></span>
        ${z.short} <span style="opacity:.6">${count}</span>
      </button>`;
  }).join('');
  chipsEl.innerHTML = all + items;

  chipsEl.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      activeZone = c.dataset.zone;
      renderChips();
      renderList();
      applyFilter();
    });
  });
}

function renderList() {
  const filter = (b) => {
    const matchZone = activeZone === 'all' || b.zone === activeZone;
    const term = searchTerm.trim().toLowerCase();
    const matchSearch = !term ||
      b.name.toLowerCase().includes(term) ||
      b.landmark.toLowerCase().includes(term) ||
      ZONES[b.zone].name.toLowerCase().includes(term);
    return matchZone && matchSearch;
  };

  const filtered = BRANCHES
    .map((b, idx) => ({ ...b, idx }))
    .filter(filter);

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">ไม่พบสาขาที่ตรงกับการค้นหา</div>`;
    return;
  }

  // Group by zone
  const grouped = {};
  filtered.forEach(b => {
    if (!grouped[b.zone]) grouped[b.zone] = [];
    grouped[b.zone].push(b);
  });

  const order = ['north','east','west','southbkk','pattaya','south','isan'];
  let html = '';

  order.forEach(zk => {
    if (!grouped[zk]) return;
    const z = ZONES[zk];
    html += `
      <div class="zone-group">
        <div class="zone-header" style="--zone-color:${z.color}">
          <span class="bar"></span>
          ${z.name}
          <span class="zone-count">${grouped[zk].length}</span>
        </div>
        ${grouped[zk].map(b => `
          <div class="branch ${activeBranchIdx === b.idx ? 'active' : ''}" data-idx="${b.idx}">
            <div class="branch-pin">
              <svg viewBox="0 0 30 39" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 24 15 24s15-13 15-24C30 6.7 23.3 0 15 0z" fill="${z.color}"/>
                <circle cx="15" cy="15" r="5" fill="#fff"/>
              </svg>
            </div>
            <div class="branch-body">
              <div class="branch-name">${b.name}</div>
              <div class="branch-meta">${b.landmark}</div>
            </div>
          </div>
        `).join('')}
      </div>`;
  });

  listEl.innerHTML = html;

  listEl.querySelectorAll('.branch').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      const b = BRANCHES[idx];
      map.flyTo([b.lat, b.lng], 16, { duration: 0.8 });
      setTimeout(() => markers[idx].openPopup(), 600);
      setActiveBranch(idx);
    });
  });
}

function setActiveBranch(idx) {
  activeBranchIdx = idx;
  // Update marker icons
  Object.entries(markers).forEach(([i, m]) => {
    const b = BRANCHES[i];
    m.setIcon(makePin(ZONES[b.zone].color, parseInt(i,10) === idx));
  });
  renderList();
}

function applyFilter() {
  BRANCHES.forEach((b, i) => {
    const visible = activeZone === 'all' || b.zone === activeZone;
    if (visible) {
      if (!map.hasLayer(markers[i])) markers[i].addTo(map);
    } else {
      if (map.hasLayer(markers[i])) map.removeLayer(markers[i]);
    }
  });

  // Auto-zoom to zone
  if (activeZone !== 'all') {
    const points = BRANCHES.filter(b => b.zone === activeZone).map(b => [b.lat, b.lng]);
    if (points.length === 1) {
      map.flyTo(points[0], 14, { duration: 0.8 });
    } else if (points.length > 1) {
      map.flyToBounds(points, { padding: [60, 60], duration: 0.8, maxZoom: 13 });
    }
  } else {
    resetView();
  }
}

function resetView() {
  // Bangkok metro fits most branches
  map.flyTo([13.78, 100.55], 10, { duration: 0.8 });
}

// ============ EVENTS ============
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderList();
});

document.getElementById('resetView').addEventListener('click', () => {
  activeZone = 'all';
  searchTerm = '';
  document.getElementById('search').value = '';
  activeBranchIdx = null;
  renderChips();
  renderList();
  applyFilter();
});

// ============ INIT ============
// Update stats
document.getElementById('stat-total').textContent = BRANCHES.length;
document.getElementById('stat-zones').textContent = Object.keys(ZONES).length;
const provinces = new Set();
BRANCHES.forEach(b => {
  if (b.zone === 'south') provinces.add('สงขลา');
  else if (b.zone === 'isan') provinces.add('ขอนแก่น');
  else if (b.zone === 'pattaya') provinces.add('ชลบุรี');
  else provinces.add('กรุงเทพฯ-ปริมณฑล');
});
document.getElementById('stat-prov').textContent = provinces.size;

renderChips();
renderList();

}); // end window.load
</script>
</body>
</html>
