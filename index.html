<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wash&Go — แผนที่สาขา</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" id="leaflet-css" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<style>
  :root {
    --ink: #0a1628;
    --ink-soft: #2a3a52;
    --paper: #f4f6f8;
    --paper-warm: #eaeef2;
    --accent: #00a3ff;
    --accent-deep: #0070c9;
    --accent-soft: #e3f2fd;
    --gold: #f5a623;
    --line: #d8dee6;
    --line-soft: #e8ecf1;

    /* Zone colors */
    --zone-north: #2563eb;     /* น้ำเงิน */
    --zone-east: #dc2626;      /* แดง */
    --zone-west: #16a34a;      /* เขียว */
    --zone-south-bkk: #9333ea; /* ม่วง */
    --zone-pattaya: #ea580c;   /* ส้ม */
    --zone-south: #0891b2;     /* ฟ้าน้ำทะเล */
    --zone-isan: #ca8a04;      /* ทอง */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    color: var(--ink);
    background: var(--paper);
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  aside {
    background: #fff;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
  }

  .brand {
    padding: 24px 24px 18px;
    border-bottom: 1px solid var(--line-soft);
    background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  .brand::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 90% 20%, rgba(0,163,255,0.25), transparent 60%);
    pointer-events: none;
  }

  .brand-mark {
    display: flex;
    align-items: baseline;
    gap: 4px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1;
    position: relative;
  }

  .brand-mark .amp {
    color: var(--accent);
    font-weight: 500;
    font-style: italic;
  }

  .brand-mark .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin-left: 2px;
    align-self: end;
    margin-bottom: 6px;
  }

  .brand-tag {
    font-size: 12px;
    margin-top: 6px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.02em;
    position: relative;
  }

  .brand-stats {
    margin-top: 14px;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    position: relative;
  }

  .brand-stats strong {
    color: #fff;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 700;
    display: block;
    margin-bottom: 1px;
  }

  /* Search */
  .search-wrap {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-soft);
    background: #fff;
  }

  .search {
    position: relative;
  }

  .search input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
    transition: all 0.15s ease;
  }

  .search input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(0,163,255,0.1);
  }

  .search svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-soft);
    opacity: 0.5;
  }

  /* Zone filters */
  .zones {
    padding: 14px 16px 8px;
    border-bottom: 1px solid var(--line-soft);
  }

  .zones-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .zone-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    border: 1.5px solid var(--line);
    background: #fff;
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }

  .chip:hover {
    border-color: var(--ink-soft);
    transform: translateY(-1px);
  }

  .chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--zone-color, var(--accent));
  }

  .chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  .chip[data-zone="all"].active {
    background: var(--accent-deep);
    border-color: var(--accent-deep);
  }

  /* Branch list */
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .list::-webkit-scrollbar {
    width: 6px;
  }
  .list::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 3px;
  }

  .zone-group {
    padding: 12px 16px 4px;
  }

  .zone-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line);
  }

  .zone-header .bar {
    width: 3px;
    height: 14px;
    background: var(--zone-color);
    border-radius: 2px;
  }

  .zone-count {
    margin-left: auto;
    font-family: 'Bricolage Grotesque', sans-serif;
    background: var(--paper);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
  }

  .branch {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 2px;
  }

  .branch:hover {
    background: var(--paper);
  }

  .branch.active {
    background: var(--accent-soft);
  }

  .branch-pin {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .branch-pin svg {
    width: 100%;
    height: 100%;
  }

  .branch-body {
    flex: 1;
    min-width: 0;
  }

  .branch-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--ink);
    word-break: break-word;
  }

  .branch-meta {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
    opacity: 0.75;
    line-height: 1.5;
  }

  .branch-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s;
  }

  .branch.active .branch-actions,
  .branch:hover .branch-actions {
    max-height: 40px;
    opacity: 1;
  }

  .branch-btn {
    flex: 1;
    text-decoration: none;
    text-align: center;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-family: inherit;
  }

  .branch-btn.google {
    background: var(--accent-deep);
    color: #fff;
  }

  .branch-btn.google:hover {
    background: var(--ink);
  }

  .branch-btn.apple {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
  }

  .branch-btn.apple:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    opacity: 0.6;
  }

  /* ===== MAP ===== */
  main {
    position: relative;
    background: var(--paper-warm);
  }

  #map {
    height: 100%;
    width: 100%;
    background: #dde4eb;
  }

  /* Floating header on map */
  .map-overlay {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 500;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .map-btn {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(10,22,40,0.08);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .map-btn:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* ===== STYLE SWITCHER ===== */
  .style-switcher {
    position: absolute;
    bottom: 80px;
    right: 16px;
    z-index: 500;
  }

  .style-toggle {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(10,22,40,0.12);
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .style-toggle:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
    transform: translateY(-1px);
  }

  .style-panel {
    position: absolute;
    bottom: calc(100% + 10px);
    right: 0;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 12px 32px rgba(10,22,40,0.18);
    padding: 14px;
    min-width: 280px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(8px) scale(0.96);
    transform-origin: bottom right;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .style-switcher.open .style-panel {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
  }

  .style-panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-weight: 700;
    padding: 0 4px;
  }

  .style-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .style-btn {
    background: var(--paper);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    text-align: left;
    font-family: inherit;
  }

  .style-btn:hover {
    background: var(--accent-soft);
    transform: translateY(-1px);
  }

  .style-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  .style-btn.active .style-desc {
    color: rgba(255,255,255,0.6);
  }

  .style-icon {
    font-size: 18px;
    margin-bottom: 2px;
  }

  .style-label {
    font-size: 12px;
    font-weight: 600;
    color: inherit;
  }

  .style-desc {
    font-size: 10px;
    color: var(--ink-soft);
    opacity: 0.8;
  }

  /* Custom Leaflet popup */
  .leaflet-popup-content-wrapper {
    border-radius: 12px;
    padding: 0;
    box-shadow: 0 8px 24px rgba(10,22,40,0.18);
    border: 1px solid var(--line);
  }

  .leaflet-popup-content {
    margin: 0;
    width: 260px !important;
    font-family: 'IBM Plex Sans Thai', sans-serif;
  }

  .leaflet-popup-tip {
    background: #fff;
  }

  .popup {
    overflow: hidden;
    border-radius: 12px;
  }

  .popup-head {
    padding: 14px 16px 10px;
    background: linear-gradient(135deg, #0a1628, #1a3a5c);
    color: #fff;
    position: relative;
  }

  .popup-zone-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 999px;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .popup-zone-tag .pdot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .popup-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
  }

  .popup-body {
    padding: 12px 16px;
    background: #fff;
  }

  .popup-landmark {
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .popup-landmark svg {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--accent-deep);
  }

  .popup-coord {
    font-family: 'Bricolage Grotesque', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    opacity: 0.7;
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }

  .popup-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .popup-btn {
    text-decoration: none;
    text-align: center;
    padding: 9px 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .popup-btn.google {
    background: var(--accent-deep);
    color: #fff;
  }

  .popup-btn.google:hover {
    background: var(--ink);
  }

  .popup-btn.apple {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--line);
  }

  .popup-btn.apple:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Custom marker */
  .pin-icon {
    background: transparent;
    border: none;
  }

  /* Mobile */
  @media (max-width: 768px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    aside {
      max-height: 45vh;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    .brand-stats { display: none; }
    .leaflet-popup-content {
      width: 220px !important;
    }
  }
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div class="brand-mark">
      Wash<span class="amp">&amp;</span>Go<span class="dot"></span>
    </div>
    <div class="brand-tag">เครือข่ายล้างรถมาตรฐาน · ทั่วประเทศ</div>
    <div class="brand-stats">
      <div><strong id="stat-total">32</strong>สาขาทั้งหมด</div>
      <div><strong id="stat-zones">7</strong>โซน</div>
      <div><strong id="stat-prov">4</strong>จังหวัด</div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="search" type="text" placeholder="ค้นหาสาขา เช่น พหลฯ, ลาดกระบัง...">
    </div>
  </div>

  <div class="zones">
    <div class="zones-title">กรองตามโซน</div>
    <div class="zone-chips" id="chips"></div>
  </div>

  <div class="list" id="list"></div>
</aside>

<main>
  <div id="map"></div>
  <div class="map-overlay">
    <button class="map-btn" id="resetView">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      มุมมองเริ่มต้น
    </button>
  </div>

  <!-- Style switcher -->
  <div class="style-switcher" id="styleSwitcher">
    <button class="style-toggle" id="styleToggle" title="เปลี่ยนรูปแบบแผนที่">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
      <span>รูปแบบแผนที่</span>
    </button>
    <div class="style-panel" id="stylePanel">
      <div class="style-panel-title">เลือกรูปแบบแผนที่</div>
      <div class="style-grid">
        <button class="style-btn active" data-style="street">
          <span class="style-icon">🗺️</span>
          <span class="style-label">แผนที่ถนน</span>
          <span class="style-desc">มาตรฐาน</span>
        </button>
        <button class="style-btn" data-style="satellite">
          <span class="style-icon">🛰️</span>
          <span class="style-label">ดาวเทียม</span>
          <span class="style-desc">ภาพถ่ายจริง</span>
        </button>
        <button class="style-btn" data-style="hybrid">
          <span class="style-icon">🌍</span>
          <span class="style-label">ดาวเทียม+ถนน</span>
          <span class="style-desc">ภาพ + ป้าย</span>
        </button>
        <button class="style-btn" data-style="terrain">
          <span class="style-icon">⛰️</span>
          <span class="style-label">ภูมิประเทศ</span>
          <span class="style-desc">ความสูงต่ำ</span>
        </button>
        <button class="style-btn" data-style="light">
          <span class="style-icon">☀️</span>
          <span class="style-label">มินิมอล</span>
          <span class="style-desc">พื้นเรียบ ขาว</span>
        </button>
        <button class="style-btn" data-style="dark">
          <span class="style-icon">🌙</span>
          <span class="style-label">โหมดมืด</span>
          <span class="style-desc">กลางคืน</span>
        </button>
      </div>
    </div>
  </div>
</main>

<script>
// ============ DYNAMIC LEAFLET LOADER ============
const LEAFLET_CDNS = [
  { js: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js',
    css: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css' },
  { js: 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
    css: 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css' },
  { js: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',
    css: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css' }
];

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}

function loadCSS(href) {
  return new Promise((resolve) => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href;
    link.onload = () => resolve();
    link.onerror = () => resolve(); // CSS error ไม่ critical
    document.head.appendChild(link);
  });
}

async function loadLeaflet() {
  for (let i = 0; i < LEAFLET_CDNS.length; i++) {
    const cdn = LEAFLET_CDNS[i];
    try {
      await loadCSS(cdn.css);
      await loadScript(cdn.js);
      if (typeof L !== 'undefined') {
        console.log('Leaflet loaded from CDN #' + (i + 1));
        return true;
      }
    } catch (e) {
      console.warn('CDN #' + (i + 1) + ' failed:', e.message);
    }
  }
  return false;
}

loadLeaflet().then(success => {
  if (!success) {
    document.getElementById('map').innerHTML =

let currentStyleKey = 'street';
let activeTileLayer = null;
let tileCheckTimer = null;
let providerIdx = 0;
let allFailedThisStyle = false;

function loadMapStyle(styleKey) {
  currentStyleKey = styleKey;
  providerIdx = 0;
  allFailedThisStyle = false;
  // Reset Google Maps fallback ถ้ามี
  const fallbackEl = document.getElementById('gmaps-fallback');
  if (fallbackEl) fallbackEl.remove();
  document.getElementById('map').style.display = '';
  window.__useGmapsFallback = false;
  map.invalidateSize();

  tryProvider(0);
  updateStyleSwitcherUI();
}

function tryProvider(idx) {
  const style = MAP_STYLES[currentStyleKey];
  if (idx >= style.providers.length) {
    if (!allFailedThisStyle) {
      allFailedThisStyle = true;
      console.error('Style "' + currentStyleKey + '" – all providers failed, using Google Maps embed');
      switchToGoogleMapsFallback();
    }
    return;
  }
  const cfg = style.providers[idx];
  console.log('🗺️ [' + style.label + '] Trying provider #' + (idx+1) + ': ' + cfg.name);

  if (activeTileLayer) {
    map.removeLayer(activeTileLayer);
    activeTileLayer = null;
  }

  const layer = L.tileLayer(cfg.url, {
    attribution: cfg.attribution,
    subdomains: cfg.subdomains || 'abc',
    maxZoom: cfg.maxZoom
  });

  let loadedCount = 0, errorCount = 0, succeeded = false;

  layer.on('tileload', () => {
    loadedCount++;
    if (loadedCount >= 1 && !succeeded) {
      succeeded = true;
      clearTimeout(tileCheckTimer);
      console.log('✅ [' + style.label + '] ' + cfg.name + ' loaded');
    }
  });

  layer.on('tileerror', () => {
    errorCount++;
    if (errorCount >= 4 && !succeeded && activeTileLayer === layer) {
      console.warn('❌ ' + cfg.name + ' failed, trying next...');
      clearTimeout(tileCheckTimer);
      activeTileLayer = null;
      map.removeLayer(layer);
      tryProvider(idx + 1);
    }
  });

  tileCheckTimer = setTimeout(() => {
    if (!succeeded && activeTileLayer === layer) {
      console.warn('⏱️ ' + cfg.name + ' timeout, trying next...');
      activeTileLayer = null;
      map.removeLayer(layer);
      tryProvider(idx + 1);
    }
  }, 5000);

  layer.addTo(map);
  activeTileLayer = layer;
}

function updateStyleSwitcherUI() {
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.style === currentStyleKey);
  });
}

// Ultimate fallback: ถ้า tile ทุกตัว block หมด ใช้ Google Maps embed iframe แทน
function switchToGoogleMapsFallback() {
  // Hide Leaflet map
  document.getElementById('map').style.display = 'none';

  // Create fallback container
  const mainEl = document.querySelector('main');
  const fallback = document.createElement('div');
  fallback.id = 'gmaps-fallback';
  fallback.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;background:#fff';

  const notice = document.createElement('div');
  notice.style.cssText = 'background:#fff8e1;border-bottom:1px solid #f5a623;padding:10px 16px;font-size:12px;color:#8a6500;display:flex;align-items:center;gap:8px';
  notice.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> เครือข่ายของคุณ block tile server ของแผนที่ — ใช้ Google Maps แทน · คลิกสาขาด้านซ้ายเพื่อเปิดดูตำแหน่ง';

  const iframe = document.createElement('iframe');
  iframe.id = 'gmaps-iframe';
  iframe.style.cssText = 'width:100%;flex:1;border:0';
  iframe.allowFullscreen = true;
  iframe.loading = 'lazy';
  iframe.referrerPolicy = 'no-referrer-when-downgrade';
  // Default view: ภาพรวมประเทศไทย แสดงสาขาแรก
  iframe.src = 'https://www.google.com/maps?q=' + BRANCHES[0].lat + ',' + BRANCHES[0].lng + '&z=11&output=embed';

  fallback.appendChild(notice);
  fallback.appendChild(iframe);
  mainEl.appendChild(fallback);

  // Override the click-to-fly behavior to update iframe instead
  window.__useGmapsFallback = true;
}

// Custom pin maker
function makePin(color, isActive = false) {
  const size = isActive ? 36 : 30;
  const svg = `
  <svg width="${size}" height="${size * 1.3}" viewBox="0 0 30 39" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
      </filter>
    </defs>
    <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 24 15 24s15-13 15-24C30 6.7 23.3 0 15 0z"
          fill="${color}" filter="url(#sh)"/>
    <circle cx="15" cy="15" r="6" fill="#fff"/>
    <circle cx="15" cy="15" r="3" fill="${color}"/>
  </svg>`;

  return L.divIcon({
    className: 'pin-icon',
    html: svg,
    iconSize: [size, size * 1.3],
    iconAnchor: [size / 2, size * 1.3]
  });
}

      <div class="popup-head">
        <div class="popup-zone-tag">
          <span class="pdot" style="background:${zone.color}"></span>
          ${zone.short}
        </div>
        <div class="popup-name">Wash&amp;Go · ${b.name}</div>
      </div>
      <div class="popup-body">
        <div class="popup-landmark">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>${b.landmark}</span>
        </div>
        <div class="popup-coord">${b.lat.toFixed(5)}, ${b.lng.toFixed(5)}</div>
        <div class="popup-actions">
          <a class="popup-btn google" href="${gMaps}" target="_blank" rel="noopener">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18 15 12 9 6"/></svg>
            Google
          </a>
          <a class="popup-btn apple" href="${aMaps}" target="_blank" rel="noopener">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18 15 12 9 6"/></svg>
            Apple
          </a>
        </div>
      </div>
    </div>`;
}

// Place markers
BRANCHES.forEach((b, i) => {
  const m = L.marker([b.lat, b.lng], { icon: makePin(ZONES[b.zone].color) })
    .addTo(map)
    .bindPopup(popupHTML(b), { closeButton: true, maxWidth: 280, minWidth: 260 });

  m.on('click', () => {
    setActiveBranch(i);
  });
  markers[i] = m;
});

// ============ SIDEBAR RENDERING ============
const chipsEl = document.getElementById('chips');
const listEl  = document.getElementById('list');

function renderChips() {
  const all = `
    <button class="chip ${activeZone === 'all' ? 'active' : ''}" data-zone="all">
      <span class="dot" style="--zone-color:#0070c9; background:#0070c9"></span>
      ทั้งหมด <span style="opacity:.6">${BRANCHES.length}</span>
    </button>`;
  const items = Object.entries(ZONES).map(([key, z]) => {
    const count = BRANCHES.filter(b => b.zone === key).length;
    return `
      <button class="chip ${activeZone === key ? 'active' : ''}" data-zone="${key}">
        <span class="dot" style="background:${z.color}"></span>
        ${z.short} <span style="opacity:.6">${count}</span>
      </button>`;
  }).join('');
  chipsEl.innerHTML = all + items;

  chipsEl.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      activeZone = c.dataset.zone;
      renderChips();
      renderList();
      applyFilter();
    });
  });
}

function renderList() {
  const filter = (b) => {
    const matchZone = activeZone === 'all' || b.zone === activeZone;
    const term = searchTerm.trim().toLowerCase();
    const matchSearch = !term ||
      b.name.toLowerCase().includes(term) ||
      b.landmark.toLowerCase().includes(term) ||
      ZONES[b.zone].name.toLowerCase().includes(term);
    return matchZone && matchSearch;
  };

  const filtered = BRANCHES
    .map((b, idx) => ({ ...b, idx }))
    .filter(filter);

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">ไม่พบสาขาที่ตรงกับการค้นหา</div>`;
    return;
  }

  // Group by zone
  const grouped = {};
  filtered.forEach(b => {
    if (!grouped[b.zone]) grouped[b.zone] = [];
    grouped[b.zone].push(b);
  });

  const order = ['north','east','west','southbkk','pattaya','south','isan'];
  let html = '';

  order.forEach(zk => {
    if (!grouped[zk]) return;
    const z = ZONES[zk];
    html += `
      <div class="zone-group">
        <div class="zone-header" style="--zone-color:${z.color}">
          <span class="bar"></span>
          ${z.name}
          <span class="zone-count">${grouped[zk].length}</span>
        </div>
        ${grouped[zk].map(b => {
          const gMaps = `https://www.google.com/maps/search/?api=1&query=${b.lat},${b.lng}`;
          const aMaps = `https://maps.apple.com/?q=${encodeURIComponent('Wash&Go ' + b.name)}&ll=${b.lat},${b.lng}`;
          return `
          <div class="branch ${activeBranchIdx === b.idx ? 'active' : ''}" data-idx="${b.idx}">
            <div class="branch-pin">
              <svg viewBox="0 0 30 39" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 24 15 24s15-13 15-24C30 6.7 23.3 0 15 0z" fill="${z.color}"/>
                <circle cx="15" cy="15" r="5" fill="#fff"/>
              </svg>
            </div>
            <div class="branch-body">
              <div class="branch-name">${b.name}</div>
              <div class="branch-meta">${b.landmark}</div>
              <div class="branch-actions">
                <a class="branch-btn google" href="${gMaps}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18 15 12 9 6"/></svg>
                  Google Maps
                </a>
                <a class="branch-btn apple" href="${aMaps}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18 15 12 9 6"/></svg>
                  Apple Maps
                </a>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  });

  listEl.innerHTML = html;

  listEl.querySelectorAll('.branch').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      const b = BRANCHES[idx];

      if (window.__useGmapsFallback) {
        // Google Maps embed mode
        const iframe = document.getElementById('gmaps-iframe');
        if (iframe) {
          iframe.src = 'https://www.google.com/maps?q=' + b.lat + ',' + b.lng + '&z=17&output=embed';
        }
        setActiveBranch(idx);
      } else {
        map.flyTo([b.lat, b.lng], 16, { duration: 0.8 });
        setTimeout(() => markers[idx].openPopup(), 600);
        setActiveBranch(idx);
      }
    });
  });
}

function setActiveBranch(idx) {
  activeBranchIdx = idx;
  // Update marker icons
  Object.entries(markers).forEach(([i, m]) => {
    const b = BRANCHES[i];
    m.setIcon(makePin(ZONES[b.zone].color, parseInt(i,10) === idx));
  });
  renderList();
}

function applyFilter() {
  BRANCHES.forEach((b, i) => {
    const visible = activeZone === 'all' || b.zone === activeZone;
    if (visible) {
      if (!map.hasLayer(markers[i])) markers[i].addTo(map);
    } else {
      if (map.hasLayer(markers[i])) map.removeLayer(markers[i]);
    }
  });

  // Auto-zoom to zone
  if (activeZone !== 'all') {
    const points = BRANCHES.filter(b => b.zone === activeZone).map(b => [b.lat, b.lng]);
    if (points.length === 1) {
      map.flyTo(points[0], 14, { duration: 0.8 });
    } else if (points.length > 1) {
      map.flyToBounds(points, { padding: [60, 60], duration: 0.8, maxZoom: 13 });
    }
  } else {
    resetView();
  }
}

function resetView() {
  // Bangkok metro fits most branches
  map.flyTo([13.78, 100.55], 10, { duration: 0.8 });
}

// ============ EVENTS ============
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderList();
});

document.getElementById('resetView').addEventListener('click', () => {
  activeZone = 'all';
  searchTerm = '';
  document.getElementById('search').value = '';
  activeBranchIdx = null;
  renderChips();
  renderList();
  applyFilter();
});

// Style switcher
const styleSwitcher = document.getElementById('styleSwitcher');
const styleToggle = document.getElementById('styleToggle');

styleToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  styleSwitcher.classList.toggle('open');
});

document.addEventListener('click', (e) => {
  if (!styleSwitcher.contains(e.target)) {
    styleSwitcher.classList.remove('open');
  }
});

document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const styleKey = btn.dataset.style;
    if (styleKey === currentStyleKey) return;
    loadMapStyle(styleKey);
    setTimeout(() => styleSwitcher.classList.remove('open'), 200);
  });
});

// ============ INIT ============
// Update stats
document.getElementById('stat-total').textContent = BRANCHES.length;
document.getElementById('stat-zones').textContent = Object.keys(ZONES).length;
const provinces = new Set();
BRANCHES.forEach(b => {
  if (b.zone === 'south') provinces.add('สงขลา');
  else if (b.zone === 'isan') provinces.add('ขอนแก่น');
  else if (b.zone === 'pattaya') provinces.add('ชลบุรี');
  else provinces.add('กรุงเทพฯ-ปริมณฑล');
});
document.getElementById('stat-prov').textContent = provinces.size;

renderChips();
renderList();

} // end initApp
</script>
</body>
</html>
